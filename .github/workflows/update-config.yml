name: Update Wazuh Configuration

on:
  push:
    paths:
      - "terraform/config/**"
  workflow_dispatch:

jobs:
  deploy-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Apply Wazuh manager configuration
        shell: pwsh
        run: ./scripts/apply-wazuh-config.ps1 -ProjectId "${{ secrets.GCP_PROJECT_ID }}" -Zone "${{ secrets.ZONE }}"
