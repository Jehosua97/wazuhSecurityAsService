<ossec_config>
  <!--
    Configuracion global del Wazuh Manager del laboratorio.
    Este archivo vive en el repo como fuente administrada y se copia al
    contenedor del manager en /var/ossec/etc/ossec.conf cuando se ejecuta
    scripts/apply-wazuh-config.ps1.

    Regla practica:
    - Cambia este archivo en el repo para que el ajuste sea persistente.
    - Editar dentro del contenedor sirve para pruebas rapidas, pero puede
      perderse cuando se vuelva a aplicar la configuracion administrada.
  -->

  <!--
    Global: define salidas de alertas, correo y tiempos de desconexion.
    jsonout_output=yes permite escribir alerts.json, usado por dashboards,
    busquedas, integraciones y automatizacion n8n.
  -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.wazuh.com</smtp_server>
    <email_from>wazuh@example.wazuh.com</email_from>
    <email_to>recipient@example.wazuh.com</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!--
    Alerts: umbrales generales de generacion de alertas.
    log_alert_level=3 guarda en alerts.log/alerts.json alertas nivel 3 o mayor.
    email_alert_level=12 solo intentaria enviar correo para alertas criticas;
    en este lab el correo esta deshabilitado arriba.
  -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!--
    Logging interno del manager.
    plain facilita leer /var/ossec/logs/ossec.log durante troubleshooting.
    Valores validos: plain, json o plain,json.
  -->
  <logging>
    <log_format>plain</log_format>
  </logging>

  <!--
    Remote: canal por donde los agentes envian eventos al manager.
    Puerto 1514/TCP es el transporte principal de telemetria de agentes.
    queue_size alto ayuda durante demos con rafagas de eventos.
  -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!--
    Rootcheck: deteccion no basada en firmas para anomalias locales.
    Busca indicios de rootkits, archivos ocultos, puertos ocultos,
    procesos sospechosos y configuraciones inusuales del sistema.
  -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>

    <!-- Ejecuta rootcheck cada 6 horas para que la demo tenga visibilidad periodica. -->
    <frequency>21600</frequency>

    <rootkit_files>etc/rootcheck/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/rootcheck/rootkit_trojans.txt</rootkit_trojans>

    <skip_nfs>yes</skip_nfs>
  </rootcheck>

  <!--
    CIS-CAT: integracion legacy para benchmarks CIS con CIS-CAT.
    Esta deshabilitada porque el lab usa SCA nativo de Wazuh mas abajo.
  -->
  <wodle name="cis-cat">
    <disabled>yes</disabled>
    <timeout>1800</timeout>
    <interval>1d</interval>
    <scan-on-start>yes</scan-on-start>

    <java_path>wodles/java</java_path>
    <ciscat_path>wodles/ciscat</ciscat_path>
  </wodle>

  <!--
    Osquery: integracion opcional para consultar el endpoint con SQL.
    Esta deshabilitada para mantener el lab liviano y evitar depender de
    paquetes extra en cada agente.
  -->
  <wodle name="osquery">
    <disabled>yes</disabled>
    <run_daemon>yes</run_daemon>
    <log_path>/var/log/osquery/osqueryd.results.log</log_path>
    <config_path>/etc/osquery/osquery.conf</config_path>
    <add_labels>yes</add_labels>
  </wodle>

  <!--
    Syscollector: inventario del sistema.
    Recolecta hardware, SO, interfaces, paquetes, puertos y procesos.
    Esta informacion alimenta inventario, vulnerabilidades y dashboards.
  -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>30m</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>

    <!-- Sincronizacion del inventario hacia el manager, limitada a 10 eventos por segundo. -->
    <synchronization>
      <max_eps>10</max_eps>
    </synchronization>
  </wodle>

  <!--
    SCA: Security Configuration Assessment.
    Ejecuta evaluaciones de configuracion del host contra politicas de seguridad
    como CIS y politicas custom distribuidas al agente.
  -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>6h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!--
    Vulnerability Detection: correlaciona inventario de paquetes con feeds CVE.
    index-status=yes escribe estado/resultados en el indexer para visualizacion
    y para automatizaciones como el workflow de n8n.
  -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!--
    Indexer: conexion TLS del manager/Filebeat hacia Wazuh Indexer.
    En este despliegue single-node el indexer se resuelve como wazuh.indexer:9200
    dentro de la red Docker del stack.
  -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://wazuh.indexer:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/ssl/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/ssl/filebeat.pem</certificate>
      <key>/etc/ssl/filebeat.key</key>
    </ssl>
  </indexer>

  <!--
    Syscheck / FIM del manager.
    Monitorea integridad de archivos locales del propio manager. No configura
    carpetas de endpoints remotos; esas rutas se configuran en cada agente.
  -->
  <syscheck>
    <disabled>no</disabled>

    <!-- Escaneos FIM cada 15 minutos para visibilidad de cambios durante la demo. -->
    <frequency>900</frequency>

    <!-- Escanea al iniciar para tener baseline y eventos iniciales. -->
    <scan_on_start>yes</scan_on_start>

    <!-- Genera alerta cuando aparece un archivo nuevo en rutas monitoreadas. -->
    <alert_new_files>yes</alert_new_files>

    <!-- No auto-ignora archivos que cambian muchas veces; util para pruebas de ransomware/FIM. -->
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Rutas base del manager a vigilar por integridad. -->
    <directories>/etc,/usr/bin,/usr/sbin</directories>
    <directories>/bin,/sbin,/boot</directories>

    <!-- Rutas ruidosas o dinamicas que se excluyen para reducir falsos positivos. -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/random.seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>

    <!-- Ignora logs y swaps, porque cambian constantemente y no aportan a FIM. -->
    <ignore type="sregex">.log$|.swp$</ignore>

    <!-- Monitorea el archivo, pero no guarda diffs de material sensible como llaves privadas. -->
    <nodiff>/etc/ssl/private.key</nodiff>

    <!-- Evita pseudo-filesystems o montajes que no conviene recorrer con FIM. -->
    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>

    <!-- Prioridad baja del proceso syscheck para no afectar el rendimiento del manager. -->
    <process_priority>10</process_priority>

    <!-- Maximo de eventos FIM por segundo emitidos por el proceso. -->
    <max_eps>100</max_eps>

    <!-- Sincronizacion de la base FIM local con limites para evitar picos de carga. -->
    <synchronization>
      <enabled>yes</enabled>
      <interval>5m</interval>
      <max_interval>1h</max_interval>
      <max_eps>10</max_eps>
    </synchronization>
  </syscheck>

  <!--
    Active Response: acciones automaticas disparadas por reglas.
    white_list protege IPs o nombres que nunca deben ser bloqueados.
  -->
  <global>
    <white_list>127.0.0.1</white_list>
    <white_list>^localhost.localdomain$</white_list>
  </global>

  <!-- Comando nativo para deshabilitar cuentas locales en agentes compatibles. -->
  <command>
    <name>disable-account</name>
    <executable>disable-account</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Comando nativo para reiniciar el agente/servicio Wazuh. -->
  <command>
    <name>restart-wazuh</name>
    <executable>restart-wazuh</executable>
  </command>

  <!--
    firewall-drop: bloquea IP origen en el firewall del host que ejecuta
    la respuesta. timeout_allowed=yes permite desbloqueo automatico.
  -->
  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- host-deny: alternativa de bloqueo via hosts.deny en sistemas que lo soporten. -->
  <command>
    <name>host-deny</name>
    <executable>host-deny</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- route-null: manda trafico hacia una ruta nula como tecnica de bloqueo. -->
  <command>
    <name>route-null</name>
    <executable>route-null</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Variante Windows de route-null. -->
  <command>
    <name>win_route-null</name>
    <executable>route-null.exe</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- netsh: comando Windows para acciones de red/firewall. -->
  <command>
    <name>netsh</name>
    <executable>netsh.exe</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!--
    Respuesta segura de demo Linux: escribe evidencia local sin bloquear,
    matar procesos ni hacer cambios destructivos.
  -->
  <command>
    <name>module-demo-response</name>
    <executable>module-demo-response.sh</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <!-- Respuesta segura de demo Windows, equivalente a module-demo-response. -->
  <command>
    <name>windows-module-demo-response</name>
    <executable>module-demo-response.cmd</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <!--
    Bloqueo automatico de fuentes web maliciosas conocidas por 10 minutos.
    Regla 100100 se dispara cuando una IP aparece en la lista AlienVault.
    location=all envia la respuesta a todos los agentes conectados; usarlo solo
    cuando se quiera bloquear esa IP en todo el laboratorio.
  -->
  <active-response>
    <command>firewall-drop</command>
    <location>all</location>
    <rules_id>100100</rules_id>
    <timeout>600</timeout>
  </active-response>

  <!--
    Bloqueo automatico de fuerza bruta lenta durante la PoC.
    Regla 100120 representa intentos repetidos de autenticacion.
    location=all envia firewall-drop a todos los agentes conectados para
    bloquear la IP origen en todo el laboratorio durante 2 minutos.
  -->
  <active-response>
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>all</location>
    <rules_id>100120</rules_id>
    <timeout>120</timeout>
  </active-response>

  <!--
    Bloqueo global para pruebas manuales de fuerza bruta.
    - 100020: regla custom para fallo SSH contra el usuario critico esquivel.
    - 5712: fuerza bruta SSH detectada por el ruleset nativo.
    timeout=120 bloquea por 2 minutos.

    location=all distribuye el bloqueo a todos los agentes conectados. Es util
    para cortar una IP atacante en todo el lab, aunque la alerta haya nacido en
    un solo endpoint.
  -->
  <active-response>
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>all</location>
    <rules_id>100020,5712</rules_id>
    <timeout>120</timeout>
  </active-response>

  <!--
    Pruebas manuales de escaneo de puertos.
    - 100030: regla custom del lab para port scan contra Linux UI.
    - 40101: regla de escaneo/actividad de red del ruleset.
    timeout=120 bloquea por 2 minutos.

    location=local ejecuta la accion en el agente donde se genero la alerta.
    Por ejemplo: si el escaneo lo detecta Linux UI, el bloqueo se aplica alli
    contra la IP origen. location=all enviaria la accion a todos los agentes,
    por eso conviene usarlo solo cuando esa sea la intencion.
  -->
  <active-response>
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>100030,40101</rules_id>
    <timeout>120</timeout>
  </active-response>

  <!--
    Active Response segura para la demo de modulos Linux.
    Regla 100309 solo crea evidencia en el endpoint; no bloquea trafico.
  -->
  <active-response>
    <disabled>no</disabled>
    <command>module-demo-response</command>
    <location>local</location>
    <rules_id>100309</rules_id>
  </active-response>

  <!-- Active Response segura para la demo de modulos Windows. -->
  <active-response>
    <disabled>no</disabled>
    <command>windows-module-demo-response</command>
    <location>local</location>
    <rules_id>100316</rules_id>
  </active-response>

  <!--
    Log analysis / comandos locales ejecutados por el manager.
    Estos localfile con log_format command/full_command generan eventos
    periodicos con salida de comandos utiles para diagnostico.
  -->
  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>360</frequency>
  </localfile>

  <!-- Inventario periodico de puertos en escucha del manager. -->
  <localfile>
    <log_format>full_command</log_format>
    <command>netstat -tulpn | sed 's/\([[:alnum:]]\+\)\ \+[[:digit:]]\+\ \+[[:digit:]]\+\ \+\(.*\):\([[:digit:]]*\)\ \+\([0-9\.\:\*]\+\).\+\ \([[:digit:]]*\/[[:alnum:]\-]*\).*/\1 \2 == \3 == \4 \5/' | sort -k 4 -g | sed 's/ == \(.*\) ==/:\1/' | sed 1,2d</command>
    <alias>netstat listening ports</alias>
    <frequency>360</frequency>
  </localfile>

  <!-- Ultimos inicios de sesion vistos por el manager. -->
  <localfile>
    <log_format>full_command</log_format>
    <command>last -n 20</command>
    <frequency>360</frequency>
  </localfile>

  <!--
    Ruleset: decoders, reglas y listas que cargara el manager.
    Primero carga el ruleset oficial de Wazuh y despues las reglas/decoders
    custom del lab en etc/rules y etc/decoders.
  -->
  <ruleset>
    <!-- Ruleset oficial de Wazuh. -->
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
    <list>etc/lists/malicious-ioc/malware-hashes</list>
    <list>etc/lists/malicious-ioc/malicious-ip</list>
    <list>etc/lists/malicious-ioc/malicious-domains</list>
    <list>etc/lists/blacklist-alienvault</list>

    <!-- Reglas y decoders custom del repositorio. -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <!--
    rule_test habilita sesiones de prueba para validar reglas con herramientas
    como wazuh-logtest sin afectar la operacion normal.
  -->
  <rule_test>
    <enabled>yes</enabled>
    <threads>1</threads>
    <max_sessions>64</max_sessions>
    <session_timeout>15m</session_timeout>
  </rule_test>

  <!--
    Authd: servicio de enrolamiento de agentes.
    Puerto 1515/TCP recibe solicitudes de registro. use_source_ip=no permite
    registrar agentes aunque lleguen detras de NAT o con IP dinamica.
  -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
    <ciphers>HIGH:!ADH:!EXP:!MD5:!RC4:!3DES:!CAMELLIA:@STRENGTH</ciphers>
    <!-- <ssl_agent_ca></ssl_agent_ca> -->
    <ssl_verify_host>no</ssl_verify_host>
    <ssl_manager_cert>etc/sslmanager.cert</ssl_manager_cert>
    <ssl_manager_key>etc/sslmanager.key</ssl_manager_key>
    <ssl_auto_negotiate>no</ssl_auto_negotiate>
  </auth>

  <!--
    Cluster Wazuh.
    El bloque existe para compatibilidad de configuracion, pero esta
    deshabilitado porque este lab usa un single-node manager.
  -->
  <cluster>
    <name>wazuh</name>
    <node_name>node01</node_name>
    <node_type>master</node_type>
    <key>aa093264ef885029653eea20dfcf51ae</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
        <node>wazuh.manager</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>

  <!--
    Recolecta el log local de Active Response para auditar cuando se ejecuta
    una accion automatica como firewall-drop o las respuestas de evidencia.
  -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

</ossec_config>
